{% extends "portal/base.html" %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4">Create Community Post</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Title -->
        <div class="mb-3">
            <input type="text" name="title" placeholder="Title" class="form-control" required>
        </div>

        <!-- Content / Description -->
        <div class="mb-3">
            <textarea name="content" placeholder="Description" class="form-control" rows="4" required></textarea>
        </div>

        <!-- Crop Type -->
        <div class="mb-3">
            <input type="text" name="crop_type" placeholder="Crop Type" class="form-control">
        </div>

        <!-- Category -->
        <div class="mb-3">
            <select name="category" class="form-control" required>
                <option value="" disabled selected>Select Category</option>
                <option value="pest">Pest Issue</option>
                <option value="fertilizer">Fertilizer</option>
                <option value="weather">Weather</option>
                <option value="market">Market Price</option>
                <option value="organic">Organic Farming</option>
            </select>
        </div>

        <!-- Image Upload -->
        <div class="mb-3">
            <input type="file" name="image" class="form-control">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-success">Post</button>
    </form>

</div>
{% endblock %}
