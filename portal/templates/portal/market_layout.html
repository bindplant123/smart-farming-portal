{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Smart Farming{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== GLOBAL ===== */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        /* ===== HEADER ===== */
        .header {
            background: #ffffff;
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-weight: 600;
            font-size: 18px;
            margin: 0;
        }

        /* ===== CONTENT ===== */
        .content {
            padding: 20px 15px 90px;
        }

        /* ===== CARD ===== */
        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.06);
            transition: all 0.25s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: #2e7d32;
            border: none;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background: #1b5e20;
        }

        .btn-outline-primary {
            border-color: #2e7d32;
            color: #2e7d32;
            border-radius: 10px;
        }

        .btn-outline-primary:hover {
            background: #2e7d32;
            color: white;
        }

        .form-control {
            border-radius: 10px;
        }

        /* ===== CART BUTTON ===== */
        .cart-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f1f3f5;
            transition: 0.3s;
        }

        .cart-btn:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -3px 15px rgba(0, 0, 0, 0.05);
        }

        .bottom-nav a {
            text-decoration: none;
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        .bottom-nav a.active {
            color: #2e7d32;
            font-weight: 600;
        }

        .bottom-nav span {
            font-size: 20px;
            display: block;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- ===== HEADER ===== -->
    <div class="header d-flex justify-content-between align-items-center">
        <h4 class="header-title">🌾 Smart Farming Market</h4>

        <a href="{% url 'portal:cart' %}" class="cart-btn shadow-sm">
            🛒
        </a>
    </div>

    <!-- ===== CONTENT ===== -->
    <div class="content container-fluid">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ===== FOOTER NAV (Optional future use) ===== -->
    <!--
    <div class="bottom-nav">
        <a href="#"><span>🏠</span>Home</a>
        <a href="#"><span>🌾</span>Market</a>
        <a href="#"><span>📊</span>Stats</a>
        <a href="#"><span>👤</span>Profile</a>
    </div>
    -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
